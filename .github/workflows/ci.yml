name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lawlink
          POSTGRES_PASSWORD: lawlink
          POSTGRES_DB: lawlink
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lawlink"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://lawlink:lawlink@localhost:5432/lawlink?schema=public
      SHADOW_DATABASE_URL: postgresql://lawlink:lawlink@localhost:5432/lawlink_shadow?schema=public
      # CI-only dummy secrets — never used to protect real data.
      NEXTAUTH_SECRET: ci-dummy-secret-not-used-for-real-data
      NEXTAUTH_URL: http://localhost:3000
      STORAGE_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Fails if prisma/schema.prisma and prisma/migrations have diverged.
      # This is the guard for the class of bug where a schema edit ships
      # without its accompanying migration (see fix in PR to upstream).
      - name: Create shadow database
        run: PGPASSWORD=lawlink psql -h localhost -U lawlink -d lawlink -c 'CREATE DATABASE lawlink_shadow;'

      - name: Check migrations are in sync with schema
        run: |
          set +e
          npx prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema-datamodel prisma/schema.prisma \
            --shadow-database-url "$SHADOW_DATABASE_URL" \
            --exit-code
          code=$?
          set -e
          if [ "$code" -eq 0 ]; then
            echo "✅ schema.prisma and prisma/migrations are in sync."
          elif [ "$code" -eq 2 ]; then
            echo "::error::schema.prisma and prisma/migrations have drifted. Run 'npx prisma migrate dev' locally and commit the generated migration."
            exit 1
          else
            echo "::error::prisma migrate diff failed (exit $code)."
            exit "$code"
          fi

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build
